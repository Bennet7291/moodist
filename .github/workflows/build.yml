name: Build Moodist for Windows

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # === 🚀 步骤 1：安装 Node.js 环境 ===
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # === 🚀 步骤 2：编译前端，生成 dist 文件夹 ===
    - name: Build Frontend Web Assets
      run: |
        npm install
        npm run build

    # === 🚀 步骤 3：安装 Go 环境 ===
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Get dependencies
      run: |
        go mod tidy

    # === 🚀 步骤 4：打包 Go 程序 ===
    - name: Build Execution File
      run: |
        go build -ldflags="-s -w -H windowsgui" -o moodist_win_x64.exe ./cmd/moodist

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Moodist-Windows-x64-GreenVersion
        path: moodist_win_x64.exe
